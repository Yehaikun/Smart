spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  kafka:
    consumer:
      properties:
        max.poll.interval.ms: 600000
        max.poll.records: 1

admin:
  bootstrap:
    enabled: false

usage-quota:
  embedding:
    init-tokens: 500000
    admin-init-tokens: 1000000

app:
  auth:
    registration:
      mode: INVITE_ONLY
      invite-required: true

embedding:
  api:
    batch-size: 25

elasticsearch:
  insecure-trust-all-certificates: false

security:
  allowed-origins: ${SECURITY_ALLOWED_ORIGINS}

logging:
  level:
    org.springframework.web: INFO
    org.springframework.boot.autoconfigure.web.servlet: INFO
    org.springframework.security: INFO
    com.yizhaoqi.smartpai: INFO
    io.minio: WARN
