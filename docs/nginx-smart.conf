# PaiSmart Nginx 配置 — 部署到 ssh2 (47.104.212.121)
# 替换 __APP_HOST__ 为后端服务器的 IP（ssh3: 81.71.120.92）
server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # 前端 SPA — 所有路由 fallback 到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 缓存控制：JS/CSS 带 hash 可长期缓存，index.html 不缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # API 反向代理到后端
    location /api/ {
        # 处理 CORS 预检请求（浏览器发 Authorization 头前会先 OPTIONS）
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        proxy_pass http://__APP_HOST__:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
    }

    # WebSocket 代理（用于实时聊天）
    location /proxy-ws {
        rewrite ^/proxy-ws(/.*)$ $1 break;
        proxy_pass http://__APP_HOST__:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
