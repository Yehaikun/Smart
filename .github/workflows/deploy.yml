name: Deploy Smart AI

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Backend
        run: |
          mvn clean package -DskipTests -q
          mkdir -p deploy/backend
          cp target/*.jar deploy/backend/app.jar
          cp launch.sh.example deploy/backend/launch.sh
          cp .env.example deploy/backend/.env

      - name: Build Frontend
        run: |
          cd frontend
          npm install -g pnpm@9
          pnpm install --no-frozen-lockfile --shamefully-hoist
          pnpm build
          mkdir -p ../deploy/frontend/dist
          cp -r dist/* ../deploy/frontend/dist/

      # ============ ssh1 — Infra (ES + Kafka) ============
      - name: Deploy Infra Config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_INFRA }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docs/docker-compose-infra.yml"
          target: "/opt/smart/"
          timeout: "60s"

      - name: Start Infra Services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_INFRA }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 重建配置有变更的容器（ES OOM 时自动重启）
            INFRA_HOST=${{ secrets.SERVER_HOST_INFRA }} docker compose -f /opt/smart/docs/docker-compose-infra.yml up -d

      - name: Wait for ES
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_INFRA }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Waiting for Elasticsearch to be ready..."
            for i in $(seq 1 30); do
              if curl -s -u elastic:PaiSmart2025 http://localhost:9200/ >/dev/null 2>&1; then
                echo "ES is ready!"
                break
              fi
              echo "  attempt $i... waiting 5s"
              sleep 5
            done

      # ============ ssh3 — Services (MySQL + Redis + MinIO) ============
      - name: Deploy Service Config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_APP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docs/docker-compose-app.yml"
          target: "/opt/smart/"
          timeout: "60s"

      - name: Start Service Containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_APP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker compose -f /opt/smart/docs/docker-compose-app.yml up -d

      - name: Init Database
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_APP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Waiting for MySQL..."
            for i in $(seq 1 30); do
              docker exec pai_smart_mysql mysqladmin ping -h localhost --silent 2>/dev/null && break
              sleep 2
            done
            docker exec pai_smart_mysql mysql -u root -pPaiSmart2025 -e \
              "CREATE DATABASE IF NOT EXISTS PaiSmart DEFAULT CHARACTER SET utf8mb4" 2>/dev/null || true
            echo "Database ready"

      # ============ ssh2 — App (Backend + Nginx + Frontend) ============
      - name: Deploy Backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/backend"
          target: "/opt/smart/"
          timeout: "120s"

      - name: Deploy Frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/frontend/dist,docs/nginx-smart.conf"
          target: "/opt/smart/"
          timeout: "120s"

      - name: Setup Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 前端文件 + Nginx 配置
            rm -rf /var/www/html/*
            cp -r /opt/smart/deploy/frontend/dist/* /var/www/html/ 2>/dev/null || true
            sed "s|__APP_HOST__|127.0.0.1|g" /opt/smart/docs/nginx-smart.conf > /etc/nginx/sites-available/default
            nginx -t && systemctl restart nginx || echo "Nginx config error"

      - name: Start Backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== 1 copy files ==="
            mkdir -p /opt/smart/backend
            cp -r /opt/smart/deploy/backend/. /opt/smart/backend/
            echo "=== 2 files copied ==="
            cd /opt/smart/backend
            ls -la
            echo "=== 3 env inject ==="
            sed -i "s|^SPRING_DATASOURCE_URL=.*|SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.SERVER_HOST_APP }}:3306/PaiSmart?useSSL=false\&serverTimezone=Asia/Shanghai\&allowPublicKeyRetrieval=true|" .env && echo "  DS ok" || echo "  DS fail"
            sed -i "s|^SPRING_DATA_REDIS_HOST=.*|SPRING_DATA_REDIS_HOST=${{ secrets.SERVER_HOST_APP }}|" .env && echo "  Redis ok" || echo "  Redis fail"
            sed -i "s|^MINIO_ENDPOINT=.*|MINIO_ENDPOINT=http://${{ secrets.SERVER_HOST_APP }}:19000|" .env && echo "  Minio ok" || echo "  Minio fail"
            sed -i "s|^MINIO_PUBLIC_URL=.*|MINIO_PUBLIC_URL=http://${{ secrets.SERVER_HOST_APP }}:19000|" .env
            sed -i "s|^ELASTICSEARCH_HOST=.*|ELASTICSEARCH_HOST=${{ secrets.SERVER_HOST_INFRA }}|" .env
            sed -i "s|^ELASTICSEARCH_PASSWORD=.*|ELASTICSEARCH_PASSWORD=${{ secrets.ELASTICSEARCH_PASSWORD }}|" .env
            sed -i "s|^SPRING_KAFKA_BOOTSTRAP_SERVERS=.*|SPRING_KAFKA_BOOTSTRAP_SERVERS=${{ secrets.SERVER_HOST_INFRA }}:9092|" .env
            sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}|" .env
            sed -i "s|^EMBEDDING_API_KEY=.*|EMBEDDING_API_KEY=${{ secrets.EMBEDDING_API_KEY }}|" .env
            sed -i "s|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}|" .env
            sed -i "s|^SECURITY_ALLOWED_ORIGINS=.*|SECURITY_ALLOWED_ORIGINS=http://localhost:*,http://127.0.0.1:*,http://${{ secrets.SERVER_HOST_ENTRY }}|" .env
            sed -i "s|^SPRING_PROFILES_ACTIVE=.*|SPRING_PROFILES_ACTIVE=prod|" .env
            sed -i "s|^ADMIN_BOOTSTRAP_ENABLED=.*|ADMIN_BOOTSTRAP_ENABLED=true|" .env
            echo "=== 4 env done ==="
            echo "=== 5 install java ==="
            apt-get install -y -qq openjdk-17-jre-headless 2>/dev/null || echo "java install skipped"
            echo "=== 6 java installed ==="
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            echo "=== 7a fuser ==="
            fuser -k 8081/tcp 2>/dev/null || true
            echo "=== 7b pkill ==="
            pkill -f "java.*app\.jar" 2>/dev/null || true
            echo "=== 7c sleep ==="
            sleep 1
            echo "=== 7d source .env ==="
            set -a
            source .env 2>/dev/null || true
            set +a
            echo "=== 7e nohup ==="
            nohup $JAVA_HOME/bin/java -server -Xms512m -Xmx512m -jar app.jar > /opt/smart/logs/backend.log 2>&1 &
            echo "=== 8 backend started ==="
