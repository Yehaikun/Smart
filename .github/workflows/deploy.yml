name: Deploy Smart AI

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Backend
        run: |
          mvn clean package -DskipTests -q
          mkdir -p deploy/backend
          cp target/*.jar deploy/backend/app.jar
          cp launch.sh.example deploy/backend/launch.sh
          cp .env.example deploy/backend/.env

      - name: Build Frontend
        run: |
          cd frontend
          npm install -g pnpm@9
          pnpm install --no-frozen-lockfile --shamefully-hoist
          pnpm build
          mkdir -p ../deploy/frontend/dist
          cp -r dist/* ../deploy/frontend/dist/

      # ============ ssh1 — Infra (ES + Kafka) ============
      - name: Deploy Infra Config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_INFRA }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docs/docker-compose-infra.yml"
          target: "/opt/smart/"
          timeout: "60s"

      - name: Start Infra Services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_INFRA }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 重建配置有变更的容器（ES OOM 时自动重启）
            INFRA_HOST=${{ secrets.SERVER_HOST_INFRA }} docker compose -f /opt/smart/docs/docker-compose-infra.yml up -d

      - name: Wait for ES
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_INFRA }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Waiting for Elasticsearch to be ready..."
            for i in $(seq 1 30); do
              if curl -s -u elastic:PaiSmart2025 http://localhost:9200/ >/dev/null 2>&1; then
                echo "ES is ready!"
                break
              fi
              echo "  attempt $i... waiting 5s"
              sleep 5
            done

      # ============ ssh3 — Services (MySQL + Redis + MinIO) ============
      - name: Deploy Service Config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_APP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docs/docker-compose-app.yml"
          target: "/opt/smart/"
          timeout: "60s"

      - name: Start Service Containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_APP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker compose -f /opt/smart/docs/docker-compose-app.yml up -d

      - name: Init Database
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_APP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Waiting for MySQL..."
            for i in $(seq 1 30); do
              docker exec pai_smart_mysql mysqladmin ping -h localhost --silent 2>/dev/null && break
              sleep 2
            done
            docker exec pai_smart_mysql mysql -u root -pPaiSmart2025 -e \
              "CREATE DATABASE IF NOT EXISTS PaiSmart DEFAULT CHARACTER SET utf8mb4" 2>/dev/null || true
            echo "Database ready"

      # ============ ssh2 — App (Backend + Nginx + Frontend) ============
      - name: Deploy Backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/backend"
          target: "/opt/smart/"
          timeout: "120s"

      - name: Deploy Frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/frontend/dist,docs/nginx-smart.conf"
          target: "/opt/smart/"
          timeout: "120s"

      - name: Setup Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 前端文件 + Nginx 配置
            rm -rf /var/www/html/*
            cp -r /opt/smart/deploy/frontend/dist/* /var/www/html/ 2>/dev/null || true
            sed "s|__APP_HOST__|127.0.0.1|g" /opt/smart/docs/nginx-smart.conf > /etc/nginx/sites-available/default
            nginx -t && systemctl restart nginx || echo "Nginx config error"

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== SSH test start ==="
            id
            ls /opt/smart/
            echo "=== SSH test end ==="
