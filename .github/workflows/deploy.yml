name: Deploy Smart AI

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Backend
        run: |
          mvn clean package -DskipTests -q
          mkdir -p deploy/backend
          cp target/*.jar deploy/backend/app.jar
          cp launch.sh.example deploy/backend/launch.sh
          cp .env.example deploy/backend/.env

      - name: Build Frontend
        run: |
          cd frontend
          npm install -g pnpm@9
          pnpm install --no-frozen-lockfile --shamefully-hoist
          pnpm build
          mkdir -p ../deploy/frontend/dist
          cp -r dist/* ../deploy/frontend/dist/

      # ============ ssh1 — Infra (ES + Kafka) ============
      - name: Deploy Infra Config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_INFRA }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docs/docker-compose-infra.yml"
          target: "/opt/smart/"
          timeout: "60s"

      - name: Start Infra Services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_INFRA }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 重建配置有变更的容器（ES OOM 时自动重启）
            INFRA_HOST=${{ secrets.SERVER_HOST_INFRA }} docker compose -f /opt/smart/docs/docker-compose-infra.yml up -d

      - name: Wait for ES
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_INFRA }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Waiting for Elasticsearch to be ready..."
            for i in $(seq 1 30); do
              if curl -s -u elastic:PaiSmart2025 http://localhost:9200/ >/dev/null 2>&1; then
                echo "ES is ready!"
                break
              fi
              echo "  attempt $i... waiting 5s"
              sleep 5
            done

      # ============ ssh3 — Services (MySQL + Redis + MinIO) ============
      - name: Deploy Service Config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_APP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docs/docker-compose-app.yml"
          target: "/opt/smart/"
          timeout: "60s"

      - name: Start Service Containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_APP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker compose -f /opt/smart/docs/docker-compose-app.yml up -d

      - name: Init Database
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_APP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Waiting for MySQL..."
            for i in $(seq 1 30); do
              docker exec pai_smart_mysql mysqladmin ping -h localhost --silent 2>/dev/null && break
              sleep 2
            done
            docker exec pai_smart_mysql mysql -u root -pPaiSmart2025 -e \
              "CREATE DATABASE IF NOT EXISTS PaiSmart DEFAULT CHARACTER SET utf8mb4" 2>/dev/null || true
            docker exec pai_smart_mysql mysql -u root -pPaiSmart2025 -e \
              "SET FOREIGN_KEY_CHECKS=0; DELETE FROM PaiSmart.users WHERE username='admin'; SET FOREIGN_KEY_CHECKS=1;" 2>/dev/null || true
            echo "Database ready"

      # ============ ssh2 — App (Backend + Nginx + Frontend) ============
      - name: Cleanup Old Processes
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 杀掉所有遗留的 java、scp、tar 进程，防止干扰新部署
            kill -9 $(lsof -ti:8081 2>/dev/null) 2>/dev/null || true
            pkill -9 -f 'scp -t' 2>/dev/null || true
            pkill -9 -f 'tar xzf' 2>/dev/null || true
            sleep 2
            echo "cleanup done"

      - name: Deploy Backend
        run: |
          cat > /tmp/deploy_key << 'EOF'
          ${{ secrets.SERVER_SSH_KEY }}
          EOF
          chmod 600 /tmp/deploy_key
          tar czf - deploy/backend | ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -i /tmp/deploy_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST_ENTRY }} \
            "tar xzf - -C /opt/smart/"
          rm -f /tmp/deploy_key

      - name: Deploy Frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/frontend/dist,docs/nginx-smart.conf"
          target: "/opt/smart/"
          timeout: "120s"

      - name: Setup Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 前端文件 + Nginx 配置
            rm -rf /var/www/html/*
            cp -r /opt/smart/deploy/frontend/dist/* /var/www/html/ 2>/dev/null || true
            sed "s|__APP_HOST__|127.0.0.1|g" /opt/smart/docs/nginx-smart.conf > /etc/nginx/sites-available/default
            nginx -t && systemctl restart nginx || echo "Nginx config error"

      - name: Start Backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST_ENTRY }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /opt/smart/backend
            cp -r /opt/smart/deploy/backend/. /opt/smart/backend/
            cd /opt/smart/backend
            sed -i "s|^SPRING_DATASOURCE_URL=.*|SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.SERVER_HOST_APP }}:3306/PaiSmart?useSSL=false\&serverTimezone=Asia/Shanghai\&allowPublicKeyRetrieval=true|" .env
            sed -i "s|^SPRING_DATA_REDIS_HOST=.*|SPRING_DATA_REDIS_HOST=${{ secrets.SERVER_HOST_APP }}|" .env
            sed -i "s|^SPRING_DATA_REDIS_PASSWORD=.*|SPRING_DATA_REDIS_PASSWORD=PaiSmart2025|" .env
            sed -i "s|^MINIO_ENDPOINT=.*|MINIO_ENDPOINT=http://${{ secrets.SERVER_HOST_APP }}:19000|" .env
            sed -i "s|^MINIO_PUBLIC_URL=.*|MINIO_PUBLIC_URL=http://${{ secrets.SERVER_HOST_APP }}:19000|" .env
            sed -i "s|^ELASTICSEARCH_HOST=.*|ELASTICSEARCH_HOST=${{ secrets.SERVER_HOST_INFRA }}|" .env
            sed -i "s|^ELASTICSEARCH_SCHEME=.*|ELASTICSEARCH_SCHEME=http|" .env
            sed -i "s|^ELASTICSEARCH_INSECURE_TRUST_ALL_CERTIFICATES=.*|ELASTICSEARCH_INSECURE_TRUST_ALL_CERTIFICATES=false|" .env
            sed -i "s|^ELASTICSEARCH_PASSWORD=.*|ELASTICSEARCH_PASSWORD=${{ secrets.ELASTICSEARCH_PASSWORD }}|" .env
            sed -i "s|^SPRING_KAFKA_BOOTSTRAP_SERVERS=.*|SPRING_KAFKA_BOOTSTRAP_SERVERS=${{ secrets.SERVER_HOST_INFRA }}:9092|" .env
            sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}|" .env
            sed -i "s|^EMBEDDING_API_KEY=.*|EMBEDDING_API_KEY=${{ secrets.EMBEDDING_API_KEY }}|" .env
            sed -i "s|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}|" .env
            sed -i "s|^SECURITY_ALLOWED_ORIGINS=.*|SECURITY_ALLOWED_ORIGINS=http://localhost:*,http://127.0.0.1:*,http://${{ secrets.SERVER_HOST_ENTRY }}|" .env
            sed -i "s|^SPRING_PROFILES_ACTIVE=.*|SPRING_PROFILES_ACTIVE=prod|" .env
            sed -i "s|^ADMIN_BOOTSTRAP_ENABLED=.*|ADMIN_BOOTSTRAP_ENABLED=true|" .env
            sed -i "s|^APP_AUTH_REGISTRATION_MODE=.*|APP_AUTH_REGISTRATION_MODE=OPEN|" .env
            sed -i "s|^APP_AUTH_INVITE_REQUIRED=.*|APP_AUTH_INVITE_REQUIRED=false|" .env
            sed -i "s|^ADMIN_BOOTSTRAP_PASSWORD=.*|ADMIN_BOOTSTRAP_PASSWORD=admin12345678|" .env
            test -f /usr/lib/jvm/java-17-openjdk-amd64/bin/java || DEBIAN_FRONTEND=noninteractive apt-get install -y -qq openjdk-17-jre-headless 2>/dev/null || true
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            # 确保旧进程完全杀掉（先 TERM 优雅停，再 KILL 强制杀）
            for pid in $(lsof -ti:8081 2>/dev/null); do kill -15 $pid 2>/dev/null || true; done
            sleep 3
            for pid in $(lsof -ti:8081 2>/dev/null); do kill -9 $pid 2>/dev/null || true; done
            sleep 2
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "${line// }" ]] && continue
              export "$line" 2>/dev/null || true
            done < .env
            nohup $JAVA_HOME/bin/java -server -Xms256m -Xmx256m -jar app.jar > /opt/smart/logs/backend.log 2>&1 &
