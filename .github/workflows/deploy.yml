name: Deploy Smart AI

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Backend
        run: |
          mvn clean package -DskipTests -q
          mkdir -p deploy/backend
          cp target/*.jar deploy/backend/app.jar
          cp launch.sh.example deploy/backend/launch.sh
          cp .env.example deploy/backend/.env

      - name: Build Frontend
        run: |
          cd frontend
          npm install -g pnpm@9
          pnpm install --no-frozen-lockfile --shamefully-hoist
          pnpm build
          mkdir -p ../deploy/frontend/dist
          cp -r dist/* ../deploy/frontend/dist/

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/*"
          target: "/opt/smart/"
          strip_components: 1

      - name: Restart Services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/smart/backend
            sed -i "s|^DEEPSEEK_API_KEY=.*|DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}|" .env
            sed -i "s|^EMBEDDING_API_KEY=.*|EMBEDDING_API_KEY=${{ secrets.EMBEDDING_API_KEY }}|" .env
            sed -i "s|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}|" .env
            sed -i "s|^ELASTICSEARCH_PASSWORD=.*|ELASTICSEARCH_PASSWORD=${{ secrets.ELASTICSEARCH_PASSWORD }}|" .env
            # 确保 MySQL 数据库存在
            docker exec mysql mysql -u root -p${SPRING_DATASOURCE_PASSWORD:-PaiSmart2025} -e "CREATE DATABASE IF NOT EXISTS PaiSmart DEFAULT CHARACTER SET utf8mb4" 2>/dev/null || true

            # 启动后端
            chmod +x launch.sh
            ./launch.sh restart 2>/dev/null || (
              mkdir -p /opt/smart/logs
              export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
              export SPRING_PROFILES_ACTIVE=prod
              nohup $JAVA_HOME/bin/java -server -Xms512m -Xmx512m -jar app.jar > /opt/smart/logs/backend.log 2>&1 &
            )
            apt install -y nginx -q
            rm -rf /var/www/html/*
            cp -r /opt/smart/frontend/dist/* /var/www/html/
            systemctl restart nginx
